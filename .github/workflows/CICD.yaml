name: CI/CD Hybrid Pipeline - Knowledge Hub

on:
  push:
    branches: [ "main" ]

env:
  AZURE_CONTAINER_REGISTRY: "monitoringapp.azurecr.io"
  API_IMAGE_NAME: "monitoring-api"
  COLLECTOR_IMAGE_NAME: "metrics-collector"
  LOCATION: "spaincentral"

jobs:
  # ==========================================
  # BUILD & PUSH TO AZURE CONTAINER REGISTRY (ACR)
  # ==========================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.AZURE_CONTAINER_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push API Image to ACR
      run: |
        docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }} -f "API Script/Dockerfile" "./API Script"
        docker tag ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }} ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest

    - name: Build and Push Collector Image to ACR
      run: |
        docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.COLLECTOR_IMAGE_NAME }}:${{ github.sha }} -f "Collector Script/Dockerfile" "./Collector Script"
        docker tag ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.COLLECTOR_IMAGE_NAME }}:${{ github.sha }} ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.COLLECTOR_IMAGE_NAME }}:latest
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.COLLECTOR_IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.COLLECTOR_IMAGE_NAME }}:latest

  # ==========================================
  # DEPLOY CORE STACK TO AZURE CONTAINER APPS (ACA)
  # ==========================================
  deploy-to-azure:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy API to Azure Container Apps
      run: |
        az containerapp up --name 'aca-monitoring-api' --resource-group 'App' --location '${{ env.LOCATION }}' --image '${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}' --registry-server '${{ env.AZURE_CONTAINER_REGISTRY }}' --registry-username '${{ secrets.ACR_USERNAME }}' --registry-password '${{ secrets.ACR_PASSWORD }}' --ingress external --target-port 5000
       
    # Catatan: InfluxDB & Grafana bisa di-deploy lewat Terraform atau manifest ACA Anda, 
    # namun image custom API dideploy otomatis melalui langkah di atas.

  # ==========================================
  # DEPLOY ON-PREMISE TO DOCKER SWARM CLUSTER
  # ==========================================
  deploy-to-swarm:
    needs: build-and-push
    runs-on: self-hosted  # CRITICAL: Berjalan di VM Swarm Manager lokal Anda!
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Login to ACR from Local Swarm
      run: |
        docker login ${{ env.AZURE_CONTAINER_REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" -p "${{ secrets.ACR_PASSWORD }}"

    - name: Deploy or Update Stack in Docker Swarm
      run: |
        # Substitusi tag image dinamis ke file docker-compose Swarm lokal
        export IMAGE_TAG=${{ github.sha }}
        export ACR_URL=${{ env.AZURE_CONTAINER_REGISTRY }}
        
        # Mengeksekusi stack deployment di Swarm Manager
        docker stack deploy --with-registry-auth -c "docker-compose.swarm.yaml" monitoring_edge