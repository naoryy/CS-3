version: '3.8'

services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run:/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /proc:/proc:ro
    ports:
      - target: 8080
        published: 8080
        mode: host            # cadvisor listen di host port 8080
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  collector:
    image: ${ACR_URL}/metrics-collector:${IMAGE_TAG}
    extra_hosts:
      - "cadvisor:host-gateway"   # ← "cadvisor" resolve ke IP host lokal node ini
    environment:
      - CADVISOR_URL=http://cadvisor:8080/api/v1.3/docker/
      - API_URL=https://aca-monitoring-api.politesea-d4b7dfa0.spaincentral.azurecontainerapps.io/metrics
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3