version: '3.8'

services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run:/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /proc:/proc:ro
    networks:
      - monitoring
    deploy:
      mode: global
      endpoint_mode: dnsrr    # ← DNS round-robin, bukan VIP
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  collector:
    image: ${ACR_URL}/metrics-collector:${IMAGE_TAG}
    environment:
      - CADVISOR_URL=http://cadvisor:8080/api/v1.3/docker/
      - API_URL=https://aca-monitoring-api.politesea-d4b7dfa0.spaincentral.azurecontainerapps.io/metrics
    networks:
      - monitoring             # ← network yang sama dengan cadvisor
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

networks:
  monitoring:
    driver: overlay
    attachable: true